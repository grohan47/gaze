[package]
name = "gaze"
version = "0.1.0"
edition = "2024"
description = "Facial authentication for Linux"
license = "MIT"
homepage = "https://gaze.gundulabs.com"
repository = "https://github.com/Gundu-Labs/gaze"
authors = ["Gundu Labs <maintainers@gundulabs.com>"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
gaze-core = { path = "../gaze-core" }
image = "0.25.9"
nalgebra = "0.34.1"
ndarray = "0.17.2"
opencv = { version = "0.98.1", default-features = false, features = ["imgproc", "videoio"] }
ort = "2.0.0-rc.11"
rayon = "1.10"
tokio = { version = "1.40", features = ["full", "rt-multi-thread"] }
ureq = "3.0"
uuid = { version = "1.10", features = ["v4"] }
zbus = "4.4.0"
zip = "2.4"
indicatif = "0.18.4"
console = "0.16.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
dialoguer = "0.12"
toml = "0.8"

[[bin]]
name = "gazed"
path = "src/main.rs"

[[bin]]
name = "gaze"
path = "src/bin/cli.rs"

