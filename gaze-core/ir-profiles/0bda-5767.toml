control_bytes = [0x00, 0, 0, 0, 0, 0, 0, 0]

[[emitter.off]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0xff, 0, 0, 0, 0, 0, 0, 0]

[[emitter.off]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0, 0xfb, 0, 0, 0x05, 0, 0, 0]

[[emitter.off]]
unit = 4
selector = 11
query = "get_cur"
size = 8

[[emitter.off]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0, 0x9f, 0, 0, 0x01, 0, 0, 0]

[[emitter.off]]
unit = 4
selector = 11
query = "set_cur"
control_bytes = [0x01, 0, 0, 0, 0, 0, 0, 0]
