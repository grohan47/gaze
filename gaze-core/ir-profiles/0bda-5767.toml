product_id = 0x5767
name       = "Realtek/Dell 0JCXG0 Integrated_Webcam_HD"
source     = "SeeleVolleri/research_0jcxg0 kernel patch; MrWinux/rtk-ir-tools"

[[emitter.on]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0xff, 0, 0, 0, 0, 0, 0, 0]

[[emitter.on]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0, 0xfb, 0, 0, 0x05, 0, 0, 0]

[[emitter.on]]
unit = 4
selector = 11
query = "get_cur"
size = 8

[[emitter.on]]
unit = 4
selector = 10
query = "set_cur"
control_bytes = [0, 0x9f, 0, 0, 0x01, 0, 0, 0]

[[emitter.on]]
unit = 4
selector = 11
query = "set_cur"
