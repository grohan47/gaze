[workspace]
members = [".", "gaze_core", "pam_gaze"]
resolver = "3"

[package]
name = "gaze"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
gaze_core = { path = "gaze_core" }
ndarray = "0.17.2"
opencv = "0.98.1"
tokio = { version = "1.40", features = ["full", "rt-multi-thread"] }
zbus = "4.4.0"

[[bin]]
name = "gazed"
path = "src/main.rs"

[[bin]]
name = "gaze"
path = "src/bin/cli.rs"
