[workspace]
members = [".", "pam_gaze"]
resolver = "3"

[package]
name = "gaze"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
image = "0.25.9"
itertools = "0.14.0"
nalgebra = "0.34.1"
ndarray = "0.17.2"
nokhwa = "0.10.10"
opencv = "0.98.1"
ort = "2.0.0-rc.11"
rusty_scrfd = "1.3.1"
tokio = { version = "1.40", features = ["full", "rt-multi-thread"] }
zbus = "4.4.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
uuid = { version = "1.10", features = ["v4"] }
libc = "0.2"

[[bin]]
name = "gazed"
path = "src/main.rs"

[[bin]]
name = "gaze"
path = "src/bin/cli.rs"
