name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build deb packages (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libclang-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libgraphene-1.0-dev \
            libopencv-dev \
            libv4l-dev \
            libpam0g-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-deb-v1
          cache-on-failure: true

      - name: Build workspace
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: cargo build --workspace --release --locked

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build deb packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: x86_64
          MULTIARCH: x86_64-linux-gnu
        run: |
          mkdir -p dist/packages
          for config in packaging/nfpm.yaml packaging/nfpm_gui.yaml packaging/nfpm_gnome_extension.yaml; do
            echo "::group::Building $config (deb)"
            nfpm pkg -f "$config" --packager deb --target dist/packages/
            echo "::endgroup::"
          done
          echo "Built packages:"; ls -lh dist/packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-deb
          path: dist/packages/*

  build-rpm:
    name: Build rpm packages (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          dnf install -y \
            clang \
            clang-devel \
            opencv-devel \
            libv4l-devel \
            pam-devel \
            gtk4-devel \
            libadwaita-devel \
            openssl-devel \
            pkg-config \
            golang \
            gcc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-rpm-v1
          cache-on-failure: true

      - name: Build workspace
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: cargo build --workspace --release --locked

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build rpm packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: x86_64
        run: |
          mkdir -p dist/packages
          for config in packaging/nfpm.yaml packaging/nfpm_gui.yaml packaging/nfpm_gnome_extension.yaml; do
            echo "::group::Building $config (rpm)"
            nfpm pkg -f "$config" --packager rpm --target dist/packages/
            echo "::endgroup::"
          done
          echo "Built packages:"; ls -lh dist/packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-rpm
          path: dist/packages/*

  build-arch:
    name: Build arch packages (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            clang \
            llvm \
            opencv \
            v4l-utils \
            pam \
            gtk4 \
            libadwaita \
            openssl \
            pkgconf \
            go \
            gcc \
            curl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-arch-v1
          cache-on-failure: true

      - name: Build workspace
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: cargo build --workspace --release --locked

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build arch packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: x86_64
        run: |
          mkdir -p dist/packages
          for config in packaging/nfpm.yaml packaging/nfpm_gui.yaml packaging/nfpm_gnome_extension.yaml; do
            echo "::group::Building $config (archlinux)"
            nfpm pkg -f "$config" --packager archlinux --target dist/packages/
            echo "::endgroup::"
          done
          echo "Built packages:"; ls -lh dist/packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-arch
          path: dist/packages/*

  release:
    name: Upload to release
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-arch]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/packages
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*

  publish-copr:
    name: Trigger COPR publish
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && secrets.COPR_WEBHOOK_URL != ''

    steps:
      - name: Trigger COPR webhook
        env:
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
        run: |
          curl -fsSL -X POST "$COPR_WEBHOOK_URL"

  publish-ppa:
    name: Trigger PPA publish
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && secrets.PPA_TRIGGER_URL != ''

    steps:
      - name: Trigger PPA pipeline endpoint
        env:
          PPA_TRIGGER_URL: ${{ secrets.PPA_TRIGGER_URL }}
        run: |
          curl -fsSL -X POST "$PPA_TRIGGER_URL"