name: CD

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  JUST_VERSION: 1.51.0
  NFPM_VERSION: v2.46.3

jobs:
  build-packages:
    name: Build ${{ matrix.name }} packages
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ubuntu-noble
            name: deb (Ubuntu 24.04 noble)
            container: ubuntu:24.04
            format: deb
            distro: ubuntu
            distro_version: "24.04"
            deb_suite: noble
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu24.04"
          - id: ubuntu-resolute
            name: deb (Ubuntu 26.04 resolute)
            container: ubuntu:26.04
            format: deb
            distro: ubuntu
            distro_version: "26.04"
            deb_suite: resolute
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu26.04"
          - id: debian-trixie
            name: deb (Debian 13 trixie)
            container: debian:13
            format: deb
            distro: debian
            distro_version: "13"
            deb_suite: trixie
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~debian13"
          - id: fedora-42
            name: rpm (Fedora 42)
            container: fedora:42
            format: rpm
            distro: fedora
            distro_version: "42"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "42"
            package_release: "1.fc42"
          - id: fedora-43
            name: rpm (Fedora 43)
            container: fedora:43
            format: rpm
            distro: fedora
            distro_version: "43"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "43"
            package_release: "1.fc43"
          - id: fedora-44
            name: rpm (Fedora 44)
            container: fedora:44
            format: rpm
            distro: fedora
            distro_version: "44"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "44"
            package_release: "1.fc44"
          - id: arch
            name: archlinux (Arch Linux)
            container: archlinux:latest
            format: archlinux
            distro: archlinux
            distro_version: rolling
            deb_suite: ""
            rpm_distro: ""
            rpm_version: ""
            package_release: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Debian/Ubuntu dependencies
        if: ${{ matrix.format == 'deb' }}
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            ca-certificates \
            curl \
            build-essential \
            clang \
            libclang-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpango1.0-dev \
            libgraphene-1.0-dev \
            libopencv-dev \
            libv4l-dev \
            libpam0g-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libssl-dev \
            gnupg \
            devscripts \
            pkg-config

      - name: Install Fedora dependencies
        if: ${{ matrix.distro == 'fedora' }}
        run: |
          dnf install -y \
            git \
            ca-certificates \
            curl \
            clang \
            clang-devel \
            opencv-devel \
            libv4l-devel \
            pam-devel \
            checkpolicy \
            policycoreutils \
            gtk4-devel \
            libadwaita-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            openssl-devel \
            gnupg2 \
            rpm-sign \
            pkg-config \
            gcc

      - name: Install Arch dependencies
        if: ${{ matrix.format == 'archlinux' }}
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            ca-certificates \
            curl \
            clang \
            llvm \
            opencv \
            v4l-utils \
            pam \
            gtk4 \
            libadwaita \
            gstreamer \
            gst-plugins-base \
            openssl \
            gnupg \
            pkgconf \
            gcc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: ${{ env.JUST_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-${{ matrix.id }}-v1
          cache-on-failure: true

      - name: Install nfpm
        run: |
          case "$(uname -m)" in
            x86_64) nfpm_arch="x86_64" ;;
            aarch64|arm64) nfpm_arch="arm64" ;;
            *) echo "Unsupported nfpm install architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          nfpm_version="${NFPM_VERSION#v}"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${nfpm_version}_Linux_${nfpm_arch}.tar.gz" \
            -o /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          nfpm --version

      - name: Configure Arch LLVM/Clang environment
        if: ${{ matrix.id == 'arch' }}
        run: |
          echo "LLVM_CONFIG_PATH=/usr/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=/usr/lib" >> "$GITHUB_ENV"
          echo "CLANG_PATH=/usr/bin/clang" >> "$GITHUB_ENV"
          echo "CC=/usr/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=/usr/bin/clang++" >> "$GITHUB_ENV"

      - name: Build native artifacts
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: |
          VERSION="${GITHUB_REF_NAME#v}" just build-rust
          VERSION="${GITHUB_REF_NAME#v}" just build-selinux

      - name: Prepare nfpm signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_SIGNING_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > /tmp/nfpm-signing-key.asc
            chmod 600 /tmp/nfpm-signing-key.asc
            echo "NFPM_SIGNING_KEY_FILE=/tmp/nfpm-signing-key.asc" >> "$GITHUB_ENV"
          fi

      - name: Package native artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}" PACKAGE_RELEASE="${{ matrix.package_release }}" just package-prebuilt "${{ matrix.format }}"
          ls -lh dist/packages/

      - name: Write package target metadata
        run: |
          cat > dist/packages/package-target.env <<EOF
          FORMAT=${{ matrix.format }}
          DISTRO=${{ matrix.distro }}
          DISTRO_VERSION=${{ matrix.distro_version }}
          DEB_SUITE=${{ matrix.deb_suite }}
          RPM_DISTRO=${{ matrix.rpm_distro }}
          RPM_VERSION=${{ matrix.rpm_version }}
          EOF

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.id }}
          path: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/packages/*.pkg.tar.*
            dist/packages/package-target.env

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-packages]

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: dist/packages

      - name: Dispatch package artifact URLs
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PACKAGES_REPO_PAT }}
          repository: GunduLabs/packages
          event-type: package-artifacts
          client-payload: '{"repo":"${{ github.repository }}","run_id":"${{ github.run_id }}","url":"https://gaze.gundulabs.com"}'

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/packages/**/*.deb
            dist/packages/**/*.rpm
            dist/packages/**/*.pkg.tar.*
