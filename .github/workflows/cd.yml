name: CD

on:
  push:
    tags: ["v*"]

jobs:
  package-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev clang libclang-dev pkg-config libv4l-dev libpam0g-dev \
            libgtk-4-dev libadwaita-1-dev
      - name: Build
        run: cargo build --workspace --release
      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install nfpm
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=$VERSION nfpm pkg --packager deb --target dist/
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: gaze-deb
          path: dist/*.deb

  package-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y \
            opencv-devel clang-devel pkgconfig v4l-utils-devel pam-devel \
            gtk4-devel libadwaita-devel rust-core cargo
      - name: Build
        run: cargo build --workspace --release
      - name: Install nfpm
        run: |
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager addrepo --from-repofrompath=goreleaser,https://repo.goreleaser.com/yum/
          dnf install -y --nogpgcheck nfpm
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=$VERSION nfpm pkg --packager rpm --target dist/
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: gaze-rpm
          path: dist/*.rpm

  release:
    needs: [package-deb, package-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
