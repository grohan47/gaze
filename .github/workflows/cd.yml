name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The tag/version to build & deploy (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: cd-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  JUST_VERSION: 1.54.0
  NFPM_VERSION: v2.47.0

jobs:
  build-packages:
    name: Build ${{ matrix.name }} packages
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    env:
      DEPLOY_REF_NAME: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ubuntu-noble-amd64
            name: deb (Ubuntu 24.04 noble, amd64)
            runner: ubuntu-latest
            container: ubuntu:24.04
            format: deb
            distro: ubuntu
            distro_version: "24.04"
            deb_suite: noble
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu24.04"
          - id: ubuntu-noble-arm64
            name: deb (Ubuntu 24.04 noble, arm64)
            runner: ubuntu-24.04-arm
            container: ubuntu:24.04
            format: deb
            distro: ubuntu
            distro_version: "24.04"
            deb_suite: noble
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu24.04"
          - id: ubuntu-questing-amd64
            name: deb (Ubuntu 25.10 questing, amd64)
            runner: ubuntu-latest
            container: ubuntu:25.10
            format: deb
            distro: ubuntu
            distro_version: "25.10"
            deb_suite: questing
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu25.10"
          - id: ubuntu-questing-arm64
            name: deb (Ubuntu 25.10 questing, arm64)
            runner: ubuntu-24.04-arm
            container: ubuntu:25.10
            format: deb
            distro: ubuntu
            distro_version: "25.10"
            deb_suite: questing
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu25.10"
          - id: ubuntu-resolute-amd64
            name: deb (Ubuntu 26.04 resolute, amd64)
            runner: ubuntu-latest
            container: ubuntu:26.04
            format: deb
            distro: ubuntu
            distro_version: "26.04"
            deb_suite: resolute
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu26.04"
          - id: ubuntu-resolute-arm64
            name: deb (Ubuntu 26.04 resolute, arm64)
            runner: ubuntu-24.04-arm
            container: ubuntu:26.04
            format: deb
            distro: ubuntu
            distro_version: "26.04"
            deb_suite: resolute
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~ubuntu26.04"
          - id: debian-trixie-amd64
            name: deb (Debian 13 trixie, amd64)
            runner: ubuntu-latest
            container: debian:13
            format: deb
            distro: debian
            distro_version: "13"
            deb_suite: trixie
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~debian13"
          - id: debian-trixie-arm64
            name: deb (Debian 13 trixie, arm64)
            runner: ubuntu-24.04-arm
            container: debian:13
            format: deb
            distro: debian
            distro_version: "13"
            deb_suite: trixie
            rpm_distro: ""
            rpm_version: ""
            package_release: "1~debian13"
          - id: fedora-42-amd64
            name: rpm (Fedora 42, amd64)
            runner: ubuntu-latest
            container: fedora:42
            format: rpm
            distro: fedora
            distro_version: "42"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "42"
            package_release: "1.fc42"
          - id: fedora-42-arm64
            name: rpm (Fedora 42, arm64)
            runner: ubuntu-24.04-arm
            container: fedora:42
            format: rpm
            distro: fedora
            distro_version: "42"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "42"
            package_release: "1.fc42"
          - id: fedora-43-amd64
            name: rpm (Fedora 43, amd64)
            runner: ubuntu-latest
            container: fedora:43
            format: rpm
            distro: fedora
            distro_version: "43"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "43"
            package_release: "1.fc43"
          - id: fedora-43-arm64
            name: rpm (Fedora 43, arm64)
            runner: ubuntu-24.04-arm
            container: fedora:43
            format: rpm
            distro: fedora
            distro_version: "43"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "43"
            package_release: "1.fc43"
          - id: fedora-44-amd64
            name: rpm (Fedora 44, amd64)
            runner: ubuntu-latest
            container: fedora:44
            format: rpm
            distro: fedora
            distro_version: "44"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "44"
            package_release: "1.fc44"
          - id: fedora-44-arm64
            name: rpm (Fedora 44, arm64)
            runner: ubuntu-24.04-arm
            container: fedora:44
            format: rpm
            distro: fedora
            distro_version: "44"
            deb_suite: ""
            rpm_distro: fedora
            rpm_version: "44"
            package_release: "1.fc44"
          - id: arch
            name: archlinux (Arch Linux)
            runner: ubuntu-latest
            container: archlinux:latest
            format: archlinux
            distro: archlinux
            distro_version: rolling
            deb_suite: ""
            rpm_distro: ""
            rpm_version: ""
            package_release: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Debian/Ubuntu dependencies
        if: ${{ matrix.format == 'deb' }}
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            ca-certificates \
            curl \
            build-essential \
            clang \
            libclang-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpango1.0-dev \
            libgraphene-1.0-dev \
            libopencv-dev \
            libv4l-dev \
            libpam0g-dev \
            libtss2-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libssl-dev \
            gnupg \
            devscripts \
            gettext-base \
            pkg-config

      - name: Install Fedora dependencies
        if: ${{ matrix.distro == 'fedora' }}
        run: |
          dnf install -y \
            git \
            ca-certificates \
            curl \
            clang \
            clang-devel \
            opencv-devel \
            libv4l-devel \
            pam-devel \
            tpm2-tss-devel \
            checkpolicy \
            policycoreutils \
            gtk4-devel \
            libadwaita-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            openssl-devel \
            gnupg2 \
            rpm-sign \
            pkg-config \
            gettext \
            gcc

      - name: Install Arch dependencies
        if: ${{ matrix.format == 'archlinux' }}
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            ca-certificates \
            curl \
            clang \
            llvm \
            opencv \
            v4l-utils \
            pam \
            tpm2-tss \
            gtk4 \
            libadwaita \
            gstreamer \
            gst-plugins-base \
            openssl \
            gnupg \
            pkgconf \
            gettext \
            gcc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: ${{ env.JUST_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-${{ matrix.id }}-v1
          cache-on-failure: true

      - name: Install nfpm
        run: |
          case "$(uname -m)" in
            x86_64) nfpm_arch="x86_64" ;;
            aarch64|arm64) nfpm_arch="arm64" ;;
            *) echo "Unsupported nfpm install architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          nfpm_version="${NFPM_VERSION#v}"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${nfpm_version}_Linux_${nfpm_arch}.tar.gz" \
            -o /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          nfpm --version

      - name: Configure Arch LLVM/Clang environment
        if: ${{ matrix.id == 'arch' }}
        run: |
          {
            echo "LLVM_CONFIG_PATH=/usr/bin/llvm-config"
            echo "LIBCLANG_PATH=/usr/lib"
            echo "CLANG_PATH=/usr/bin/clang"
            echo "CC=/usr/bin/clang"
            echo "CXX=/usr/bin/clang++"
          } >> "$GITHUB_ENV"

      - name: Build native artifacts
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: |
          VERSION="${DEPLOY_REF_NAME#v}" just build-rust
          VERSION="${DEPLOY_REF_NAME#v}" just build-selinux

      - name: Prepare nfpm signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_SIGNING_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > /tmp/nfpm-signing-key.asc
            chmod 600 /tmp/nfpm-signing-key.asc
            echo "NFPM_SIGNING_KEY_FILE=/tmp/nfpm-signing-key.asc" >> "$GITHUB_ENV"
          fi

      - name: Package native artifacts
        run: |
          VERSION="${DEPLOY_REF_NAME#v}" PACKAGE_RELEASE="${{ matrix.package_release }}" just package-prebuilt "${{ matrix.format }}"
          ls -lh dist/packages/

      - name: Write package target metadata
        run: |
          cat > dist/packages/package-target.env <<EOF
          FORMAT=${{ matrix.format }}
          DISTRO=${{ matrix.distro }}
          DISTRO_VERSION=${{ matrix.distro_version }}
          DEB_SUITE=${{ matrix.deb_suite }}
          RPM_DISTRO=${{ matrix.rpm_distro }}
          RPM_VERSION=${{ matrix.rpm_version }}
          EOF

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.id }}
          path: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/packages/*.pkg.tar.*
            dist/packages/package-target.env

  build-flatpak:
    name: Build flatpak (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      DEPLOY_REF_NAME: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder elfutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: ${{ env.JUST_VERSION }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-flatpak-vendor-${{ matrix.arch }}-v1
          cache-on-failure: true

      - name: Add flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak GNOME SDK
        run: flatpak install --user -y flathub org.gnome.Sdk//49 org.gnome.Platform//49

      - name: Install Flatpak Rust SDK extension
        run: flatpak install --user -y flathub org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Install Flatpak LLVM SDK extension
        run: flatpak install --user -y flathub org.freedesktop.Sdk.Extension.llvm20//25.08

      - name: Import GPG key for flatpak signing
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.PACKAGE_SIGNING_KEY }}

      - name: Build flatpak repo and bundle
        env:
          FLATPAK_GPG_SIGN: ${{ steps.import_gpg.outputs.fingerprint }}
          FLATPAK_BUILDER_JOBS: 4
        run: |
          VERSION="${DEPLOY_REF_NAME#v}" just build-flatpak

      - name: Upload flatpak bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-flatpak-${{ matrix.arch }}
          path: dist/packages/*.flatpak

      - name: Upload flatpak remote metadata
        if: ${{ matrix.arch == 'amd64' }}
        uses: actions/upload-artifact@v7
        with:
          name: packages-flatpak-metadata
          path: |
            dist/packages/*.flatpakref
            dist/packages/*.flatpakrepo

  dispatch-packages:
    name: Dispatch packages to self-hosted repo
    runs-on: ubuntu-latest
    # Must wait for build-flatpak too: the packages repo downloads ALL of this
    # run's artifacts by run_id when the dispatch lands, so every artifact
    # (deb/rpm/arch AND the flatpak bundles) has to be uploaded first.
    needs: [build-packages, build-flatpak]

    steps:
      # No checkout or artifact download needed: GunduLabs/packages pulls the
      # packages-* artifacts itself by run_id and builds the apt/rpm/flatpak/aur repos.
      - name: Trigger GunduLabs/packages publish
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PACKAGES_REPO_PAT }}
          repository: GunduLabs/packages
          event-type: package-artifacts
          client-payload: '{"repo":"${{ github.repository }}","run_id":"${{ github.run_id }}","url":"https://gaze.gundulabs.com"}'

  release-github:
    name: Upload packages to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-packages, build-flatpak]
    env:
      DEPLOY_REF_NAME: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: dist/packages

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.DEPLOY_REF_NAME }}
          files: |
            dist/packages/**/*.deb
            dist/packages/**/*.rpm
            dist/packages/**/*.pkg.tar.*
            dist/packages/**/*.flatpak
            dist/packages/**/*.flatpakref
            dist/packages/**/*.flatpakrepo

  # AUR publishing lives in GunduLabs/packages (its publish-repos.yml builds the
  # Arch binary repo and pushes the AUR wrapper packages from the artifacts it
  # downloads via the dispatch above). Publishing it from here too raced the
  # packages repo on aur.archlinux.org, so it was removed.
