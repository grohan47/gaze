name: CD

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NFPM_VERSION: v2.46.3

jobs:
  build-packages:
    name: Build ${{ matrix.name }} packages
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: deb
            name: deb (Ubuntu)
            container: ubuntu:24.04
            format: deb
            install_cmd: |
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                git \
                ca-certificates \
                curl \
                golang \
                clang \
                libclang-dev \
                libcairo2-dev \
                libglib2.0-dev \
                libgdk-pixbuf-2.0-dev \
                libgstreamer1.0-dev \
                libgstreamer-plugins-base1.0-dev \
                libpango1.0-dev \
                libgraphene-1.0-dev \
                libopencv-dev \
                libv4l-dev \
                libpam0g-dev \
                libgtk-4-dev \
                libadwaita-1-dev \
                libssl-dev \
                gnupg \
                devscripts \
                pkg-config
          - id: rpm
            name: rpm (Fedora)
            container: fedora:42
            format: rpm
            install_cmd: |
              dnf install -y \
                git \
                ca-certificates \
                curl \
                golang \
                clang \
                clang-devel \
                opencv-devel \
                libv4l-devel \
                pam-devel \
                checkpolicy \
                policycoreutils \
                gtk4-devel \
                libadwaita-devel \
                gstreamer1-devel \
                gstreamer1-plugins-base-devel \
                openssl-devel \
                gnupg2 \
                rpm-sign \
                pkg-config \
                gcc
          - id: arch
            name: archlinux (Arch Linux)
            container: archlinux:latest
            format: archlinux
            install_cmd: |
              pacman -Syu --noconfirm
              pacman -S --noconfirm \
                git \
                ca-certificates \
                curl \
                go \
                clang \
                llvm \
                opencv \
                v4l-utils \
                pam \
                gtk4 \
                libadwaita \
                gstreamer \
                gst-plugins-base \
                openssl \
                gnupg \
                pkgconf \
                gcc

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: ${{ matrix.install_cmd }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-${{ matrix.id }}-v1
          cache-on-failure: true

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Configure Arch LLVM/Clang environment
        if: ${{ matrix.id == 'arch' }}
        run: |
          echo "LLVM_CONFIG_PATH=/usr/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=/usr/lib" >> "$GITHUB_ENV"
          echo "CLANG_PATH=/usr/bin/clang" >> "$GITHUB_ENV"
          echo "CC=/usr/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=/usr/bin/clang++" >> "$GITHUB_ENV"

      - name: Build native artifacts
        env:
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: -Cdebuginfo=0
        run: |
          VERSION="${GITHUB_REF_NAME#v}" just build-rust
          VERSION="${GITHUB_REF_NAME#v}" just build-selinux

      - name: Prepare nfpm signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_SIGNING_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > /tmp/nfpm-signing-key.asc
            chmod 600 /tmp/nfpm-signing-key.asc
            echo "NFPM_SIGNING_KEY_FILE=/tmp/nfpm-signing-key.asc" >> "$GITHUB_ENV"
          fi

      - name: Package native artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}" just package-prebuilt "${{ matrix.format }}"
          ls -lh dist/packages/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.id }}
          path: |
            dist/packages/*.deb
            dist/packages/*.rpm
            dist/packages/*.pkg.tar.*

  build-flatpak:
    name: Build flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder elfutils

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Add flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak GNOME SDK
        run: flatpak install --user -y flathub org.gnome.Sdk//47 org.gnome.Platform//47

      - name: Install Flatpak Rust SDK extension
        run: flatpak install --user -y flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Install Flatpak LLVM SDK extension
        run: flatpak install --user -y flathub org.freedesktop.Sdk.Extension.llvm18//24.08

      - name: Import GPG key for flatpak signing
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PACKAGE_SIGNING_KEY }}

      - name: Build flatpak repo and bundle
        env:
          FLATPAK_GPG_SIGN: ${{ steps.import_gpg.outputs.fingerprint }}
        run: just build-flatpak

      - name: Stage flatpakref for artifacts
        run: |
          mkdir -p dist/packages
          cp packaging/flatpak/com.gundulabs.Gaze.flatpakref dist/packages/com.gundulabs.Gaze.flatpakref

      - name: Upload flatpak package artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-flatpak
          path: |
            dist/packages/*.flatpak
            dist/packages/*.flatpakref

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-packages, build-flatpak]

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: dist/packages

      - name: Dispatch package artifact URLs
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PACKAGES_REPO_PAT }}
          repository: GunduLabs/packages
          event-type: package-artifacts
          client-payload: '{"repo":"${{ github.repository }}","run_id":"${{ github.run_id }}"}'

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/packages/**/*.deb
            dist/packages/**/*.rpm
            dist/packages/**/*.pkg.tar.*
            dist/packages/**/*.flatpakref
