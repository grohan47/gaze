name: "gaze"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "admin"
priority: "optional"
maintainer: "GunduLabs <contact@gundulabs.com>"
description: "Facial authentication daemon with PAM support"
vendor: "GunduLabs"
homepage: "https://github.com/gaze/gaze"
license: "MIT"

contents:
  - src: "target/release/gazed"
    dst: "/usr/bin/gazed"
    type: "file"
    file_info:
      mode: 0755
  - src: "target/release/gaze"
    dst: "/usr/bin/gaze"
    type: "file"
    file_info:
      mode: 0755
  - src: "dist/config.toml"
    dst: "/etc/gaze/config.toml"
    type: "config"
  - src: "dist/org.gaze.Auth.conf"
    dst: "/etc/dbus-1/system.d/org.gaze.Auth.conf"
    type: "file"
  - src: "dist/gazed.service"
    dst: "/usr/lib/systemd/system/gazed.service"
    type: "file"
  - src: "target/release/libpam_gaze.so"
    dst: "/lib/${MULTIARCH}/security/pam_gaze.so"
    packager: deb
  - src: "target/release/libpam_gaze_grosshack.so"
    dst: "/lib/${MULTIARCH}/security/pam_gaze_grosshack.so"
    packager: deb
  - src: "target/release/libpam_gaze.so"
    dst: "/usr/lib64/security/pam_gaze.so"
    packager: rpm
  - src: "target/release/libpam_gaze_grosshack.so"
    dst: "/usr/lib64/security/pam_gaze_grosshack.so"
    packager: rpm
  - src: "target/release/libpam_gaze.so"
    dst: "/usr/lib/security/pam_gaze.so"
    packager: archlinux
  - src: "target/release/libpam_gaze_grosshack.so"
    dst: "/usr/lib/security/pam_gaze_grosshack.so"
    packager: archlinux

  - src: "dist/pam-configs/gaze"
    dst: "/usr/share/pam-configs/gaze"
    packager: deb
  - src: "dist/authselect/custom/gaze/README"
    dst: "/usr/share/authselect/custom/gaze/README"
    packager: rpm
  - src: "dist/authselect/custom/gaze/REQUIREMENTS"
    dst: "/usr/share/authselect/custom/gaze/REQUIREMENTS"
    packager: rpm
  - src: "dist/authselect/custom/gaze/system-auth"
    dst: "/usr/share/authselect/custom/gaze/system-auth"
    packager: rpm
  - src: "dist/authselect/custom/gaze/password-auth"
    dst: "/usr/share/authselect/custom/gaze/password-auth"
    packager: rpm
  - src: "dist/authselect/custom/gaze/fingerprint-auth"
    dst: "/usr/share/authselect/custom/gaze/fingerprint-auth"
    packager: rpm
  - src: "dist/authselect/custom/gaze/smartcard-auth"
    dst: "/usr/share/authselect/custom/gaze/smartcard-auth"
    packager: rpm
  - src: "dist/authselect/custom/gaze/postlogin"
    dst: "/usr/share/authselect/custom/gaze/postlogin"
    packager: rpm

overrides:
  deb:
    scripts:
      postinstall: "packaging/postinst_deb.sh"
      preremove: "packaging/prerm_deb.sh"
    depends:
      - libopencv-dev
      - libpam0g
  rpm:
    scripts:
      postinstall: "packaging/postinst_rpm.sh"
    depends:
      - opencv
      - pam
  archlinux:
    scripts:
      postinstall: "packaging/postinst_arch.sh"
    depends:
      - opencv
      - pam
