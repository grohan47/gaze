name: "gaze-gui"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "admin"
priority: "optional"
maintainer: "Gundu Labs <maintainers@gundulabs.com>"
description: "GTK4/Adwaita GUI for managing Gaze facial authentication"
vendor: "Gundu Labs"
homepage: "https://gaze.gundulabs.com"
license: "MIT"

contents:
  - src: "target/release/gaze-gui"
    dst: "/usr/bin/gaze-gui"
    type: "file"
    file_info:
      mode: 0755
  - src: "dist/com.gundulabs.Gaze.desktop"
    dst: "/usr/share/applications/com.gundulabs.Gaze.desktop"
    type: "file"
  - src: "dist/com.gundulabs.Gaze.svg"
    dst: "/usr/share/icons/hicolor/scalable/apps/com.gundulabs.Gaze.svg"
    type: "file"

overrides:
  deb:
    depends:
      - gaze
      - libgtk-4-1
      - libadwaita-1-0
  rpm:
    depends:
      - gaze
      - gtk4
      - libadwaita
  archlinux:
    depends:
      - gaze
      - gtk4
      - libadwaita
