app-id: com.gundulabs.Gaze
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm18
command: gaze-gui
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --system-talk-name=org.gaze.Auth
  - --filesystem=xdg-run/gvfsd
  - --filesystem=xdg-run/gvfs:ro
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/doc
modules:
  - name: opencv
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      no-debuginfo: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTS=OFF
      - -DBUILD_PERF_TESTS=OFF
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_DOCS=OFF
      - -DBUILD_opencv_python3=OFF
      - -DBUILD_opencv_java=OFF
      - -DBUILD_opencv_world=OFF
      - -DOPENCV_GENERATE_PKGCONFIG=ON
      - -DWITH_IPP=OFF
      - -DWITH_CUDA=OFF
      - -DWITH_OPENCL=ON
      - -DWITH_OPENMP=ON
      - -DWITH_GTK=ON
      - -DWITH_QT=OFF
      - -DBUILD_LIST=core,dnn,imgproc,videoio
    sources:
      - type: archive
        url: https://github.com/opencv/opencv/archive/refs/tags/4.10.0.tar.gz
        sha256: b2171af5be6b26f7a06b1229948bbb2bdaa74fcf5cd097e0af6378fce50a6eb9

  - name: gaze-gui
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin
      env:
        CARGO_HOME: /run/build/gaze-gui/cargo
        CARGO_TARGET_DIR: /run/build/gaze-gui/target
        LLVM_CONFIG_PATH: /usr/lib/sdk/llvm18/bin/llvm-config
        LIBCLANG_PATH: /usr/lib/sdk/llvm18/lib
        ORT_STRATEGY: system
        ORT_LIB_LOCATION: /app/lib
        ORT_PREFER_DYNAMIC_LINK: "1"
    build-commands:
      - install -Dm644 .cargo/config.toml /run/build/gaze-gui/gaze/.cargo/config.toml
      - mkdir -p /run/build/gaze-gui/ort
      - tar -xzf .flatpak-cache/ort/onnxruntime.tgz -C /run/build/gaze-gui/ort --strip-components=1
      - mkdir -p /app/lib
      - cp -a /run/build/gaze-gui/ort/lib/libonnxruntime.so* /app/lib/
      - cargo build --release --locked --offline -p gaze-gui
      - install -Dm755 target/release/gaze-gui /app/bin/gaze-gui
      - install -Dm644 packaging/gui/com.gundulabs.Gaze.desktop /app/share/applications/com.gundulabs.Gaze.desktop
      - install -Dm644 packaging/gui/com.gundulabs.Gaze.svg /app/share/icons/hicolor/scalable/apps/com.gundulabs.Gaze.svg
      - install -Dm644 packaging/gui/com.gundulabs.Gaze.metainfo.xml /app/share/metainfo/com.gundulabs.Gaze.metainfo.xml
    sources:
      - type: dir
        path: ../../
