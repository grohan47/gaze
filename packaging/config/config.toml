# Security level determines which InsightFace models and threshold to use.
#
# Preset levels:
#   low      - MobileFaceNet + SCRFD-500M, threshold 0.3  (fastest, least secure)
#   medium   - MobileFaceNet + SCRFD-500M, threshold 0.4  (default)
#   high     - ResNet50 + SCRFD-10G, threshold 0.5        (more accurate)
#   maximum  - ResNet50 + SCRFD-10G, threshold 0.6        (strictest)
#
# Models are automatically downloaded from the official InsightFace GitHub
# releases if not already present in the models directory.

[security]
level = "medium"

# Custom level example:
# level = "custom"
# detector = "det_10g.onnx"
# recognizer = "w600k_r50.onnx"
# threshold = 0.45

[cameras]
rgb = "primary"
# Infrared (Windows Hello) camera. Set to the IR /dev/video* node to authenticate
# via infrared instead of the RGB camera. Run `gaze discover` to find the node.
# ir = "/dev/video2"
# Drive the camera's IR emitter (turn the IR LED on during auth). Requires `ir`.
# emitter_enabled = false
# Reject frames whose mean brightness (0-255) is below this value as too dark.
dark_luma_threshold = 70

[auth]
abort_if_ssh = true
abort_if_lid_closed = true
# Require manual intent confirmation (Press Enter to confirm, Esc to cancel) after successful face auth
require_confirmation = false

[enrollment]
max_templates = 3

# Liveness anti-spoofing runs a local MiniFASNet-V2 PAD model on the detected face crop.
# The model is downloaded into /var/cache/gaze on first use if missing.
[liveness]
enabled = true
threshold = 0.8
max_frames = 40
