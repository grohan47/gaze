# Security level determines which InsightFace models and threshold to use.
#
# Preset levels:
#   low      - MobileFaceNet + SCRFD-500M, threshold 0.3  (fastest, least secure)
#   medium   - MobileFaceNet + SCRFD-500M, threshold 0.4  (default)
#   high     - ResNet50 + SCRFD-10G, threshold 0.5        (more accurate)
#   maximum  - ResNet50 + SCRFD-10G, threshold 0.6        (strictest)
#
# Models are automatically downloaded from the official InsightFace GitHub
# releases if not already present in the models directory.

[security]
level = "medium"

# Custom level example:
# level = "custom"
# detector = "accurate"          # "standard" or "accurate"
# recognizer = "accurate"        # "standard" or "accurate"
# threshold = 0.45
# hybrid_policy = "fallback_on_dark"  # optional; default, or, fallback_on_dark, and

[cameras]
rgb = "primary"
# Infrared (Windows Hello) camera. Set this to a direct /dev/video* node or the
# camera's GStreamer source string (e.g. "pipewiresrc target-object=<pipewire-target>").
# ir = "/dev/video2"
# Drive the camera's IR emitter (turn the IR LED on during auth). Requires `ir`.
# emitter_enabled = false
# Reject frames whose mean brightness (0-255) is below this value as too dark.
dark_luma_threshold = 30

[auth]
abort_if_ssh = true
abort_if_lid_closed = true
# Require manual intent confirmation (Press Enter to confirm, Esc to cancel) after successful face auth
require_confirmation = false
# Delay face auth by this many milliseconds on the first unlock after resuming from
# suspend, so the display has time to come back instead of unlocking behind a black
# screen. 0 disables it. Increase (e.g. 3000) if your GPU is slow to repaint.
resume_grace_ms = 0

[enrollment]
max_templates = 2

# Liveness anti-spoofing runs a local MiniFASNet-V2 PAD model on the detected face crop.
# The model is downloaded into /var/cache/gaze on first use if missing.
[liveness]
enabled = true
threshold = 0.8
max_frames = 40

[storage]
# Encrypt face templates at rest with a TPM-sealed key (requires a TPM 2.0). See docs.
encrypt_templates = false
